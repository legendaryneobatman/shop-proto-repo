syntax = "proto3";

package contracts.v1;

option go_package = "github.com/legendaryneobatman/shop/gen/contracts/v1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc SignIn(SignInRequest) returns (SignInResponse) {}
  rpc SignUp(SignUpRequest) returns (SignUpResponse) {}
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
  rpc LogoutAll(google.protobuf.Empty) returns (google.protobuf.Empty) {}
}

message SignInRequest {
  string username = 1;
  string password = 2;
}
message SignInResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message SignUpRequest {
  string name = 1;
  string username = 2;
  string password = 3;
}
message SignUpResponse {
  string id = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}
message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}
message LogoutRequest {
  string access_token = 1;
}
message LogoutResponse {}

service UserService {
  rpc GetCurrentUser(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserById(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserList(google.protobuf.Empty) returns (GetUserListResponse) {}
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
}

enum UserRole {
  ROLE_UNSPECIFIED = 0;
  ADMIN = -1;
  USER = 1;
  MODERATOR = 2;
}

message GetUserRequest {
  optional string id = 1;
}
message GetUserResponse {
  string id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string avatar_url = 5;
  string phone = 6;
  UserRole role = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}
message GetUserListResponse {
  repeated GetUserResponse data = 1;
}
message CreateUserRequest {
  string name = 1;
  string username = 2;
  string password_hash = 3;
}
message CreateUserResponse {
  string id = 1;
}
message UpdateUserRequest {
  string id = 1;
  optional string name = 2;
  optional string username = 3;
  optional string email = 4;
  optional string avatar_url = 5;
  optional string phone = 6;
  optional UserRole role = 7;
  optional bool is_active = 8;
}
message UpdateUserResponse {
  string id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string avatar_url = 5;
  string phone = 6;
  UserRole role = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}
message DeleteUserRequest {
  string id = 1;
}
message DeleteUserResponse {
  string id = 1;
}