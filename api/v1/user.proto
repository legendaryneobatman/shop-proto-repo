syntax = "proto3";
package user.v1;
option go_package = "github.com/legendaryneobatman/shop/gen/contracts/v1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service UserService {
  rpc GetCurrentUser(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserById(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserList(google.protobuf.Empty) returns (GetUserListResponse) {}
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
}

message GetUserRequest {
  optional string id = 1;
}
message GetUserResponse {
  User data = 1;
}
message GetUserListResponse {
  repeated User data = 1;
}
message CreateUserRequest {
  string name = 1;
  string username = 2;
  string password_hash = 3;
}
message CreateUserResponse {
  string id = 1;
}
message UpdateUserRequest {
  string id = 1;
  optional string name = 2;
  optional string username = 3;
  optional string email = 4;
  optional string avatar_url = 5;
  optional string phone = 6;
  optional UserRole role = 7;
  optional bool is_active = 8;
}
message UpdateUserResponse {
  string id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string avatar_url = 5;
  string phone = 6;
  UserRole role = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}
message DeleteUserRequest {
  string id = 1;
}
message DeleteUserResponse {
  string id = 1;
}

enum UserRole {
  ROLE_UNSPECIFIED = 0;
  ADMIN = -1;
  USER = 1;
  MODERATOR = 2;
}

message User {
  string id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string avatar_url = 5;
  string phone = 6;
  UserRole role = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}