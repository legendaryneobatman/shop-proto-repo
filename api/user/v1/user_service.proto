syntax = "proto3";
package user.v1;
option go_package = "github.com/legendaryneobatman/shop/gen/contracts/v1";

import "google/protobuf/empty.proto";
import "api/user/v1/user_messages.proto";

service UserService {
  rpc GetCurrentUser(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserById(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserList(google.protobuf.Empty) returns (GetUserListResponse) {}
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
}